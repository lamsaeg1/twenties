<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TWENTIES</title>
  <link rel="icon" type="image/png" href="WhatsApp_Image_2026-05-11_at_10.16.39_PM-removebg-preview.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Alfa+Slab+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --accent: #c8f000;
      --gray: #1a1a1a;
      --muted: #888;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 28px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* LOGO */
    .logo-wrap {
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 18vw, 88px);
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1;
      text-align: center;
    }

    .logo span {
      color: var(--accent);
    }

    /* DIVIDER */
    .divider {
      width: 32px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 24px;
      opacity: 0;
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards;
    }

    /* BIO */
    .bio {
      text-align: center;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--muted);
      letter-spacing: 0.02em;
      max-width: 300px;
      margin-bottom: 44px;
      opacity: 0;
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
    }

    /* LINKS */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      padding: 18px 22px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }

    .link-btn:active { transform: scale(0.97); }

    /* Dark pill — Shop (lime accent) */
    .link-btn.dark {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-weight: 700;
    }
    .link-btn.dark:hover { filter: brightness(1.1); }

    /* Light pills — social */
    .social-row {
      display: flex;
      gap: 12px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
    }

    .link-btn.light {
      flex: 1;
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }

    /* Instagram — gradient */
    .link-btn.instagram {
      background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7);
      color: #fff;
      border: none;
    }
    .link-btn.instagram:hover { filter: brightness(1.1); }

    /* TikTok — black with tiktok vibe */
    .link-btn.tiktok {
      background: #010101;
      color: #fff;
      border: 2px solid #fff;
    }
    .link-btn.tiktok:hover { background: #1a1a1a; }

    .btn-icon-img {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG icons inline */
    .icon-shop { font-size: 18px; }

    .link-btn.dark  { animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards; }
    .social-row     { animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards; }

    /* FOOTER */
    .footer {
      margin-top: 48px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
      opacity: 0;
      animation: rise 0.5s ease 0.8s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile tweak */
    @media (max-width: 480px) {
      .container { padding: 40px 20px 48px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <div class="logo">TWENTIES</div>
    </div>

    <div class="divider"></div>

    <p class="bio">
      A clothing brand built for those who dare to break the rules.
      Repping Egypt's twenties generation — one drop at a time.
    </p>

    <div class="links">

      <!-- Shop — dark full-width pill -->
      <a class="link-btn dark" href="https://sllr.co/2wenties" target="_blank" rel="noopener">
        <span>🌐</span>
        <span>Visit Our Shop</span>
      </a>

      <!-- Social — two branded pills side by side -->
      <div class="social-row">
        <a class="link-btn light instagram" href="https://www.instagram.com/twentieseg" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="5.5" fill="white" fill-opacity="0.25"/>
            <circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="1.8" fill="none"/>
            <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
          </svg>
          <span>Instagram</span>
        </a>

        <a class="link-btn light tiktok" href="https://www.tiktok.com/@twentieseg" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/>
          </svg>
          <span>TikTok</span>
        </a>
      </div>

    </div>

    <p class="footer">© 2025 Twenties EG &nbsp;·&nbsp; Made by <a href="https://www.instagram.com/lamsaeg1/" target="_blank" rel="noopener" style="color:#fff;text-decoration:none;font-family:'Alfa Slab One',serif;font-size:11px;letter-spacing:0.05em;">Lamsa</a></p>
  </div>
</body>
</html>
